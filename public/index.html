<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BambooCrash</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- ES Module Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <!-- CRASH FLASH OVERLAY -->
        <div id="crash-flash"></div>
        
        <!-- TOP RIBBON -->
        <div id="stats-ribbon">
            <span id="player-count">Players: 1</span> | <span id="timer-text">Time: 3:00</span> | <span id="ping-text">Ping: --</span>
        </div>
        
        <div id="kill-feed-container"></div>
        
        <button id="btn-pause-ui">⏸</button>
        
        <div id="crosshair"></div>
        
        <div id="hud">
            <div class="hud-box">
                <span class="label">HEALTH</span>
                <div class="bar-bg"><div id="health-bar" class="bar-fill"></div></div>
                <span id="health-text" class="value">100%</span>
            </div>
            <div class="hud-box">
                <span class="label">THRUST</span>
                <span id="speed-text" class="value">40</span>
            </div>
        </div>
        
        <div id="scoreboard" class="glass-panel hidden">
            <h2>TOP PILOTS</h2>
            <ul id="score-list">
                <li>Loading data...</li>
            </ul>
        </div>
        
        <div class="controls-hint">
            WASD - Move | ARROWS - Altitude | ENTER - Attack | TAB - Scores | P - Pause
        </div>

        <div id="mobile-controls">
           <div id="joystick-zone">
               <div id="joystick-knob"></div>
           </div>
           <div id="action-buttons">
              <button id="btn-ascend">^</button>
              <button id="btn-shoot">FIRE</button>
              <button id="btn-descend">v</button>
           </div>
        </div>
    </div>
    
    <div id="pause-menu" class="glass-panel hidden">
        <h1 id="pause-title">PAUSED</h1>
        <p id="pause-desc">Press 'P' or click below to resume</p>
        <button id="btn-resume" style="margin-top: 20px; padding: 10px 20px; background: rgba(0,242,254,0.3); border: 2px solid #00f2fe; color: white; cursor: pointer; border-radius: 5px; font-weight: bold;">RESUME</button>
    </div>
    
    <!-- STARTUP MAIN MENU -->
    <div id="main-menu">
        <h1 class="logo">BAMBOCRASH</h1>
        <p>High-Speed Drone Combat</p>
        
        <input type="text" id="username-input" placeholder="ENTER CALLSIGN" maxlength="12">
        <div class="skin-selector">
            <button id="btn-skin-drone" class="skin-btn active">
                <svg width="40" height="40" viewBox="0 0 100 100" style="display:block; margin: 0 auto 10px auto;">
                    <!-- Drone base -->
                    <rect x="30" y="40" width="40" height="20" fill="#333" />
                    <rect x="25" y="45" width="50" height="10" fill="#f33" />
                    <!-- Rotors -->
                    <ellipse cx="20" cy="35" rx="15" ry="5" fill="#ccc" />
                    <rect x="18" y="35" width="4" height="15" fill="#888" />
                    <ellipse cx="80" cy="35" rx="15" ry="5" fill="#ccc" />
                    <rect x="78" y="35" width="4" height="15" fill="#888" />
                </svg>
                DRONE
            </button>
            <button id="btn-skin-bamboo" class="skin-btn">
                <svg width="40" height="40" viewBox="0 0 100 100" style="display:block; margin: 0 auto 10px auto;">
                    <!-- Dome Base -->
                    <path d="M30 80 Q50 40 70 80 Z" fill="#d4af37" />
                    <rect x="30" y="80" width="40" height="5" fill="#a48f27" />
                    <!-- Stick -->
                    <rect x="47" y="30" width="6" height="50" fill="#d4af37" />
                    <!-- Rotor Head -->
                    <rect x="42" y="25" width="16" height="8" fill="#d4af37" />
                    <!-- Rotor Blade -->
                    <ellipse cx="50" cy="22" rx="40" ry="6" fill="#fff" opacity="0.6" stroke="#ccc" />
                </svg>
                BAMBOO COPTER
            </button>
        </div>
        
        <button id="btn-start">INITIALIZE ENGINES</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
